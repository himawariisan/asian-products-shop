{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<section class="checkout spad">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center" style="padding: 80px 0;">
                <i class="fa fa-check-circle" style="font-size:70px; color:#7fba00;"></i>
                <h2 style="margin-top:20px;">Thank you for your order!</h2>
                <p style="margin:15px 0 30px; color:#666;">
                    Your order has been received. We will contact you shortly.
                </p>
                <a href="{% url 'shop_grid' %}" class="primary-btn">Continue Shopping</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
