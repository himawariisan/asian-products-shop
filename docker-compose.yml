services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - PYTHONUTF8=1
    command:
      sh -c "python manage.py migrate &&
             python manage.py loaddata shop/fixtures/shop_data.json && 
              python manage.py runserver 0.0.0:8000"
